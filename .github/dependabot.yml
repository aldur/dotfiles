version: 2
updates:
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 1,15 * *"
      timezone: "Etc/UTC"
  # The workflows pin actions by full SHA; without this, those pins never get
  # update PRs and silently rot. Scans .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 1,15 * *"
      timezone: "Etc/UTC"
