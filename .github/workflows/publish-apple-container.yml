on:
  workflow_dispatch:
  push:
    branches:
      - master
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# Publish master to the production `latest` tags; publish any other branch
# (e.g. staging) to `<branch>-*` tags so it can never clobber what `container
# run` consumers pull from `latest`.
env:
  TAG_PREFIX: ${{ github.ref_name == 'master' && 'latest' || github.ref_name }}

jobs:
  push:
    name: ${{ matrix.app.name }} (${{ matrix.arch.suffix }})
    strategy:
      matrix:
        arch:
          - { runner: ubuntu-24.04-arm, suffix: arm64 }
          - { runner: ubuntu-24.04, suffix: amd64 }
        app:
          - { name: push, reclaim-disk: true }
          - { name: push-minimal, reclaim-disk: false }
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2

      - if: matrix.app.reclaim-disk
        run: |
          sudo rm -rf /usr/lib/jvm /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache
          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - run: echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: nix run --override-input aldur-dotfiles . ./base_hosts/apple-container#${{ matrix.app.name }} -- ghcr.io/${{ github.repository_owner }} "$TAG_PREFIX-${{ matrix.arch.suffix }}"

  manifest:
    needs: push
    name: ${{ matrix.app }}
    strategy:
      matrix:
        app:
          - manifest
          - manifest-minimal
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2

      # Multi-arch manifest for the branch's tag prefix (`latest` on master).
      - run: echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: nix run --override-input aldur-dotfiles . ./base_hosts/apple-container#${{ matrix.app }} -- ghcr.io/${{ github.repository_owner }} "$TAG_PREFIX"
