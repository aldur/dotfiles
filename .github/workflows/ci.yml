on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flake-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3.21.5
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6  # v12
      - run: nix flake check --all-systems --no-build .

  # Build each Linux system's flake checks on a matching runner (flake-check
  # above only evaluates them, see `--no-build`).
  flake-checks-build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3.21.5
      - run: nix build .#checks.${{ matrix.system }}.headless-defaults

  # One job per (runner, target): the image builds each need tens of GB of
  # scratch space (full-system tarball + 16GiB disk image + copy into the
  # store), so they get a fresh runner instead of sharing one disk.
  nixos-ci:
    strategy:
      matrix:
        include:
          # Test building QEMU VM configuration
          - runner: ubuntu-24.04
            target: ./base_hosts/qemu#vm-nogui
          - runner: ubuntu-24.04-arm
            target: ./base_hosts/qemu#vm-nogui

          # Test building the Crostini Baguette image (aarch64-only)
          - runner: ubuntu-24.04-arm
            target: ./base_hosts/crostini#baguette-image

          # Test building the Apple `container` OCI image (serves `container
          # run` and `container machine`; aarch64 is the target).
          - runner: ubuntu-24.04-arm
            target: ./base_hosts/apple-container#container-image
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3.21.5

      # Reclaim disk space
      - run: |
          sudo rm -rf /usr/lib/jvm /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache
          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - run: nix build --override-input aldur-dotfiles . ${{ matrix.target }}

  nix-darwin-ci:
    runs-on: macos-26  # arm, beta
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3.21.5

      # `nix flake check --all-systems` (in the flake-check job) already
      # evaluates every system's outputs including darwin — evaluation is
      # host-independent and doesn't build packages — so re-running it on this
      # expensive macOS runner is pure duplication. Just build the darwin bits.

      # Test building nix-darwin configuration
      - run: nix build --override-input aldur-dotfiles . ./base_hosts/macos#darwinConfigurations.macOS.system

  nix-darwin-ci-llm:
    runs-on: macos-26  # arm, beta
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3.21.5

      # flake check runs once in the flake-check job (see nix-darwin-ci); no
      # need to repeat it on this macOS runner.

      # Explicitly build `llm` with `mlx`, which often breaks on Darwin.
      - run: nix build .#llm
