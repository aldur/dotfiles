on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nixos-ci:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
          - runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@1d699fc25db3f9e079cd2f168ca007a4183389be # v3.15.1
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6  # v12
      - run: nix flake check --all-systems .

      # Reclaim disk space
      - run: |
          sudo rm -rf /usr/lib/jvm /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache
          docker system prune -af || true
          docker builder prune -af || true
          df -h

      # Test building QEMU VM configuration
      - run: nix build --override-input aldur-dotfiles . ./base_hosts/qemu#vm-nogui

      # Test building the Crostini Baguette image (aarch64-only)
      - if: matrix.runner == 'ubuntu-24.04-arm'
        run: nix build --override-input aldur-dotfiles . ./base_hosts/crostini#baguette-image

      # Test building the Apple `container` OCI image (serves `container run`
      # and `container machine`; aarch64 is the target).
      - if: matrix.runner == 'ubuntu-24.04-arm'
        run: nix build --override-input aldur-dotfiles . ./base_hosts/apple-container#container-image

  nix-darwin-ci:
    runs-on: macos-26  # arm, beta
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@1d699fc25db3f9e079cd2f168ca007a4183389be # v3.15.1
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6  # v12
      - run: nix flake check --all-systems .

      # Test building nix-darwin configuration
      - run: nix build --override-input aldur-dotfiles . ./base_hosts/macos#darwinConfigurations.macOS.system

  nix-darwin-ci-llm:
    runs-on: macos-26  # arm, beta
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@1d699fc25db3f9e079cd2f168ca007a4183389be # v3.15.1
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6  # v12
      - run: nix flake check --all-systems .

      # Explicitly build `llm` with `mlx`, which often breaks on Darwin.
      - run: nix build .#llm
